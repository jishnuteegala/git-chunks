version: 2

project_name: git-chunks

builds:
  - id: git-chunks
    main: ./cmd/git-chunks
    binary: git-chunks
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

nfpms:
  - package_name: git-chunks
    homepage: https://github.com/jishnuteegala/git-chunks
    maintainer: Jishnu Teegala <134275562+jishnuteegala@users.noreply.github.com>
    description: |-
      Split large pushes into chunked commits to beat SCM push
      size limits and per-push scan timeouts.
    license: MIT
    formats:
      - deb
      - rpm
      - apk
      - archlinux
    dependencies:
      - git
    bindir: /usr/bin

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  use: github
  groups:
    - title: Features
      regexp: '^feat(\(.*\))?!?:'
      order: 0
    - title: Bug Fixes
      regexp: '^fix(\(.*\))?!?:'
      order: 1
    - title: Performance
      regexp: '^perf(\(.*\))?!?:'
      order: 2
    - title: Documentation
      regexp: '^docs(\(.*\))?!?:'
      order: 3
    - title: Build System and Dependencies
      regexp: '^build(\(.*\))?!?:'
      order: 4
    - title: Continuous Integration
      regexp: '^ci(\(.*\))?!?:'
      order: 5
    - title: Other Changes
      order: 999
  filters:
    exclude:
      - "^test:"
      - "^chore:"
      - "^style:"
      - "^refactor:"

release:
  mode: keep-existing
  draft: true
  use_existing_draft: true
  replace_existing_artifacts: true
  github:
    owner: jishnuteegala
    name: git-chunks

homebrew_casks:
  - name: git-chunks
    repository:
      owner: jishnuteegala
      name: homebrew-tap
      token: "{{ .Env.PACKAGES_GITHUB_TOKEN }}"
    homepage: https://github.com/jishnuteegala/git-chunks
    description: Commit and push changes in chunks to avoid SCM push size limits
    license: MIT
    hooks:
      post:
        install: |
          if system_command("/usr/bin/xattr", args: ["-h"]).exit_status == 0
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/git-chunks"]
          end

scoops:
  - name: git-chunks
    repository:
      owner: jishnuteegala
      name: scoop-bucket
      token: "{{ .Env.PACKAGES_GITHUB_TOKEN }}"
    homepage: https://github.com/jishnuteegala/git-chunks
    description: Commit and push changes in chunks to avoid SCM push size limits
    license: MIT

aurs:
  - name: git-chunks-bin
    homepage: https://github.com/jishnuteegala/git-chunks
    description: Commit and push changes in chunks to avoid SCM push size limits
    maintainers:
      - Jishnu Teegala <134275562+jishnuteegala@users.noreply.github.com>
    license: MIT
    depends:
      - git
    git_url: ssh://aur@aur.archlinux.org/git-chunks-bin.git
    private_key: '{{ envOrDefault "AUR_KEY" "" }}'
    skip_upload: '{{ if index .Env "AUR_KEY" }}false{{ else }}true{{ end }}'
    package: |-
      install -Dm755 "./git-chunks" "${pkgdir}/usr/bin/git-chunks"
      install -Dm644 "./LICENSE" "${pkgdir}/usr/share/licenses/git-chunks/LICENSE"
    commit_author:
      name: Jishnu Teegala
      email: 134275562+jishnuteegala@users.noreply.github.com

winget:
  - name: git-chunks
    publisher: jishnuteegala
    package_identifier: jishnuteegala.git-chunks
    publisher_url: https://github.com/jishnuteegala
    publisher_support_url: https://github.com/jishnuteegala/git-chunks/issues
    homepage: https://github.com/jishnuteegala/git-chunks
    short_description: Commit and push changes in chunks to avoid SCM push size limits
    license: MIT
    license_url: https://github.com/jishnuteegala/git-chunks/blob/main/LICENSE
    release_notes: "{{ .Changelog }}"
    release_notes_url: https://github.com/jishnuteegala/git-chunks/releases/tag/v{{ .Version }}
    tags:
      - git
      - cli
      - push
    repository:
      owner: jishnuteegala
      name: winget-pkgs
      branch: git-chunks-{{ .Version }}
      token: "{{ .Env.WINGET_GITHUB_TOKEN }}"
      pull_request:
        enabled: true
        base:
          owner: microsoft
          name: winget-pkgs
          branch: master
