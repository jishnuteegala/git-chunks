version: 2

project_name: git-chunker

before:
  hooks:
    - go mod tidy

builds:
  - id: git-chunker
    binary: git-chunker
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

nfpms:
  - package_name: git-chunker
    homepage: https://github.com/jishnuteegala/git-chunker
    maintainer: Jishnu Teegala <134275562+jishnuteegala@users.noreply.github.com>
    description: |-
      Split large pushes into chunked commits to beat SCM push
      size limits and per-push scan timeouts.
    license: MIT
    formats:
      - deb
      - rpm
      - apk
      - archlinux
    dependencies:
      - git
    bindir: /usr/bin

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  use: github
  groups:
    - title: Features
      regexp: '^feat(\(.*\))?!?:'
      order: 0
    - title: Bug Fixes
      regexp: '^fix(\(.*\))?!?:'
      order: 1
    - title: Performance
      regexp: '^perf(\(.*\))?!?:'
      order: 2
    - title: Other
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - "^style:"
      - "^refactor:"

release:
  mode: keep-existing
  github:
    owner: jishnuteegala
    name: git-chunker

homebrew_casks:
  - name: git-chunker
    repository:
      owner: jishnuteegala
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/jishnuteegala/git-chunker
    description: Commit and push changes in chunks to avoid SCM push size limits
    license: MIT
    hooks:
      post:
        install: |
          if system_command("/usr/bin/xattr", args: ["-h"]).exit_status == 0
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/git-chunker"]
          end

scoops:
  - name: git-chunker
    repository:
      owner: jishnuteegala
      name: scoop-bucket
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/jishnuteegala/git-chunker
    description: Commit and push changes in chunks to avoid SCM push size limits
    license: MIT

aurs:
  - name: git-chunker-bin
    homepage: https://github.com/jishnuteegala/git-chunker
    description: Commit and push changes in chunks to avoid SCM push size limits
    maintainers:
      - Jishnu Teegala <134275562+jishnuteegala@users.noreply.github.com>
    license: MIT
    git_url: ssh://aur@aur.archlinux.org/git-chunker-bin.git
    private_key: '{{ envOrDefault "AUR_KEY" "" }}'
    skip_upload: '{{ if index .Env "AUR_KEY" }}false{{ else }}true{{ end }}'
    package: |-
      install -Dm755 "./git-chunker" "${pkgdir}/usr/bin/git-chunker"
      install -Dm644 "./LICENSE" "${pkgdir}/usr/share/licenses/git-chunker/LICENSE"
    commit_author:
      name: Jishnu Teegala
      email: 134275562+jishnuteegala@users.noreply.github.com

winget:
  - name: git-chunker
    publisher: jishnuteegala
    package_identifier: jishnuteegala.git-chunker
    publisher_url: https://github.com/jishnuteegala
    publisher_support_url: https://github.com/jishnuteegala/git-chunker/issues
    homepage: https://github.com/jishnuteegala/git-chunker
    short_description: Commit and push changes in chunks to avoid SCM push size limits
    license: MIT
    license_url: https://github.com/jishnuteegala/git-chunker/blob/main/LICENSE
    release_notes: "{{ .Changelog }}"
    release_notes_url: https://github.com/jishnuteegala/git-chunker/releases/tag/v{{ .Version }}
    tags:
      - git
      - cli
      - push
    repository:
      owner: jishnuteegala
      name: winget-pkgs
      branch: git-chunker-{{ .Version }}
      token: "{{ .Env.WINGET_GITHUB_TOKEN }}"
      pull_request:
        enabled: true
        base:
          owner: microsoft
          name: winget-pkgs
          branch: master

chocolateys:
  - name: git-chunker
    title: git-chunker
    authors: Jishnu Teegala
    owners: Jishnu Teegala
    project_url: https://github.com/jishnuteegala/git-chunker
    project_source_url: https://github.com/jishnuteegala/git-chunker
    package_source_url: https://github.com/jishnuteegala/git-chunker
    docs_url: https://github.com/jishnuteegala/git-chunker/blob/main/README.md
    bug_tracker_url: https://github.com/jishnuteegala/git-chunker/issues
    license_url: https://github.com/jishnuteegala/git-chunker/blob/main/LICENSE
    require_license_acceptance: false
    summary: Commit and push changes in chunks to avoid SCM push size limits
    description: |
      git-chunker splits pending changes into multiple commits based on
      criteria you set (max files, max size per commit), optionally pushing
      after each one so every push stays under SCM platform size limits.
    release_notes: "https://github.com/jishnuteegala/git-chunker/releases/tag/v{{ .Version }}"
    tags: "git cli push chunk"
    skip_publish: true
