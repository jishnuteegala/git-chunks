name: Feature request
description: Propose a focused improvement
title: "feat: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What concrete problem or workflow limitation should be solved?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the smallest useful behavior and example CLI usage.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Existing commands, scripts, or simpler approaches you considered.
  - type: checkboxes
    id: scope
    attributes:
      label: Checklist
      options:
        - label: This request is about chunking Git commits or pushes.
          required: true
        - label: I searched for an existing request.
          required: true
